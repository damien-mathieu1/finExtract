services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: finextract
      POSTGRES_PASSWORD: finextract
      POSTGRES_DB: finextract
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finextract"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src
      - ./tests/fixtures:/app/fixtures

volumes:
  postgres_data:
