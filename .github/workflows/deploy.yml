name: Deploy

on:
  release:
    types: [published]
  workflow_dispatch: {}

env:
  REGISTRY: ghcr.io
  GCP_REGION: europe-west1

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  build-push:
    runs-on: ubuntu-latest
    outputs:
      api_image: ${{ steps.tags.outputs.api_image }}
      frontend_image: ${{ steps.tags.outputs.frontend_image }}
    steps:
      - uses: actions/checkout@v4

      - id: tags
        run: |
          TAG="${GITHUB_SHA::12}"
          echo "api_image=${REGISTRY}/${{ github.repository }}-api:${TAG}" >> "$GITHUB_OUTPUT"
          echo "frontend_image=${REGISTRY}/${{ github.repository }}-frontend:${TAG}" >> "$GITHUB_OUTPUT"

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build & push api
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.tags.outputs.api_image }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          target: prod
          push: true
          tags: ${{ steps.tags.outputs.frontend_image }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  deploy:
    needs: build-push
    runs-on: ubuntu-latest
    steps:
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOYER_SA_EMAIL }}

      - uses: google-github-actions/setup-gcloud@v2

      # Cloud Run pulls ghcr.io images unauthenticated, so the packages must be
      # public. One-time setup: after the first build-push run, go to
      # github.com/<owner>/<repo>/pkgs/container/FinExtract-api (and -frontend)
      # -> Package settings -> Change visibility -> Public.

      - name: Deploy api to Cloud Run
        run: |
          gcloud run deploy finextract-api \
            --project "${{ secrets.GCP_PROJECT_ID }}" \
            --region "${{ env.GCP_REGION }}" \
            --image "${{ needs.build-push.outputs.api_image }}"

      - name: Deploy frontend to Cloud Run
        run: |
          gcloud run deploy finextract-frontend \
            --project "${{ secrets.GCP_PROJECT_ID }}" \
            --region "${{ env.GCP_REGION }}" \
            --image "${{ needs.build-push.outputs.frontend_image }}"
