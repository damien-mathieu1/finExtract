services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: finextract
      POSTGRES_PASSWORD: finextract
      POSTGRES_DB: finextract
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finextract"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src
      - ./alembic:/app/alembic
      - ./tests/fixtures:/app/fixtures
    command: >
      sh -c "uv run alembic upgrade head &&
             uv run uvicorn finextract.main:app --host 0.0.0.0 --port 8000 --reload"

  frontend:
    build:
      context: ./frontend
      target: dev
    env_file: .env
    environment:
      API_PROXY_TARGET: http://api:8000
    depends_on:
      - api
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/app:/app/app
      - ./frontend/components:/app/components
      - ./frontend/lib:/app/lib
      - ./frontend/public:/app/public
      - ./frontend/next.config.mjs:/app/next.config.mjs

volumes:
  postgres_data:
